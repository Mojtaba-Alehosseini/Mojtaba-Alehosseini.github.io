<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not found &mdash; Mojtaba Alehosseini</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#F8F5EE" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#14161A" media="(prefers-color-scheme: dark)" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet" />
  <script>
    (function() {
      try {
        var s = localStorage.getItem('theme');
        if (s === 'dark' || s === 'light') document.documentElement.dataset.theme = s;
        else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.dataset.theme = 'dark';
        else document.documentElement.dataset.theme = 'light';
      } catch (e) { document.documentElement.dataset.theme = 'light'; }
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .nf {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .nf__inner { max-width: 32rem; }
    .nf__small {
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 0.5rem;
    }
    .nf h1 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      margin: 0 0 0.75rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    .nf p { color: var(--text-soft); margin: 0 0 1rem; }
  </style>
</head>
<body>
  <main class="nf">
    <div class="nf__inner">
      <p class="nf__small">error 404</p>
      <h1>Page not found.</h1>
      <p>
        The URL points at something that isn't here. The link is probably
        stale.
      </p>
      <p><a class="link" href="/">&larr; back to the front page</a></p>
    </div>
  </main>
</body>
</html>
