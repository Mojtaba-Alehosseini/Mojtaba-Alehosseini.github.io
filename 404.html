<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Mojtaba Alehosseini</title>
  <meta name="theme-color" content="#0A0A0B" />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230A0A0B'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='monospace' font-size='18' font-weight='700' fill='%23F5A524'%3EM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .nf {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: left;
    }
    .nf__inner {
      max-width: 36rem;
      display: grid;
      gap: 1rem;
    }
    .nf__code {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--amber);
    }
    .nf__title {
      font-family: var(--sans);
      font-size: clamp(2.4rem, 8vw, 4.5rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1;
      margin: 0;
    }
    .nf__copy {
      font-size: 1.05rem;
      color: var(--muted-strong);
      line-height: 1.55;
      margin: 0;
    }
    .nf__back {
      margin-top: 1rem;
      font-family: var(--mono);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  <main class="nf">
    <div class="nf__inner">
      <span class="nf__code">// ERROR_404</span>
      <h1 class="nf__title">Page not found.</h1>
      <p class="nf__copy">
        The URL points at something that isn't here. Either the link is stale
        or I haven't built that page yet.
      </p>
      <p class="nf__back">
        <a class="link link--amber" href="/">← Back to the front page</a>
      </p>
    </div>
  </main>
</body>
</html>
